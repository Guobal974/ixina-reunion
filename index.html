<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IXINA Réunion · Configurateur cuisine</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ix:#004078;--ix-d:#002d55;--ix-m:#005aa0;--ix-l:#e0ecf7;--ix-p:#f0f5fb;
  --wh:#fff;--bg:#f5f7fa;--g1:#f1f5f9;--g2:#e2e8f0;--g4:#94a3b8;--g6:#475569;--g8:#1e293b;
  --hot:#e53e3e;--warm:#d97706;--cold:#3b82f6;--ok:#16a34a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Raleway',sans-serif;background:var(--bg);color:var(--g8);min-height:100vh}
#intro{position:fixed;inset:0;background:var(--ix);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .6s ease,transform .6s ease;overflow:hidden}
#intro::before{content:'';position:absolute;width:700px;height:700px;border-radius:50%;border:1px solid rgba(255,255,255,.06);top:-200px;right:-200px}
#intro.out{opacity:0;pointer-events:none;transform:scale(1.03)}
.i-logo{animation:fup .7s .1s both}
.i-logo img{height:180px;max-width:440px;object-fit:contain;border-radius:6px}
.i-sep{width:40px;height:2px;background:rgba(255,255,255,.3);margin:1.6rem auto;animation:fup .7s .25s both}
.i-title{font-family:'Playfair Display',serif;font-size:1.85rem;color:var(--wh);font-style:italic;text-align:center;max-width:440px;line-height:1.45;animation:fup .7s .38s both;padding:0 2rem}
.i-sub{color:rgba(255,255,255,.6);font-size:.82rem;text-align:center;max-width:340px;line-height:1.8;margin:.9rem 0 2.5rem;animation:fup .7s .5s both;padding:0 2rem}
.i-btn{background:var(--wh);color:var(--ix);border:none;padding:1rem 3rem;font-family:'Raleway',sans-serif;font-size:.78rem;font-weight:800;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:all .25s;animation:fup .7s .62s both}
.i-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,0,0,.25)}
.i-dots{display:flex;gap:.4rem;margin-top:2rem;animation:fup .7s .75s both}
.i-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25)}
.i-dot:first-child{width:20px;border-radius:3px;background:rgba(255,255,255,.85)}
@keyframes fup{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
#app{display:none;min-height:100vh}
#app.on{display:flex}
.sb{width:340px;min-width:340px;background:var(--ix);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-hd{padding:1.6rem;border-bottom:1px solid rgba(255,255,255,.1);background:var(--ix-d);flex-shrink:0}
.sb-hd img{height:55px;max-width:200px;object-fit:contain;border-radius:4px}
.sb-tag{font-size:.6rem;color:rgba(255,255,255,.4);letter-spacing:.2em;text-transform:uppercase;margin-top:.3rem;font-weight:700}
.sb-prog{padding:1.4rem 1.6rem;flex:1}
.sb-prog-title{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.38);margin-bottom:1rem;font-weight:700}
.ptrack{display:flex;flex-direction:column}
.pstep{display:flex;align-items:flex-start;gap:.75rem;padding:.45rem 0;cursor:pointer}
.pdot-w{display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding-top:2px}
.pdot{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:.6rem;color:rgba(255,255,255,.3);transition:all .3s;font-weight:700}
.pconn{width:1px;min-height:12px;flex:1;background:rgba(255,255,255,.1);margin:3px 0;transition:background .3s}
.pstep.active .pdot{background:var(--wh);border-color:var(--wh);color:var(--ix)}
.pstep.done .pdot{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.4);color:var(--wh)}
.pstep.done .pdot::after{content:'✓';font-size:.65rem}
.pstep.done .pdot span{display:none}
.pstep.active .pconn,.pstep.done .pconn{background:rgba(255,255,255,.28)}
.plbl{padding-top:2px;font-size:.68rem;color:rgba(255,255,255,.32);font-weight:400;line-height:1.4;transition:color .25s}
.plbl strong{display:block;font-size:.7rem;font-weight:700;margin-bottom:.05rem}
.pstep.active .plbl{color:rgba(255,255,255,.68)}
.pstep.active .plbl strong{color:var(--wh)}
.pstep.done .plbl{color:rgba(255,255,255,.48)}
.pstep.done .plbl strong{color:rgba(255,255,255,.72)}
.sb-narr{padding:1.2rem 1.6rem;border-top:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.16);flex-shrink:0}
.narr-lbl{font-size:.57rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:.6rem;font-weight:700}
.narr-txt{font-family:'Playfair Display',serif;font-size:.88rem;color:rgba(255,255,255,.82);line-height:1.8;font-style:italic}
.narr-txt em{color:var(--wh);font-style:normal;font-weight:700}
.cons{display:flex;align-items:center;gap:.65rem;margin-top:.9rem;padding-top:.9rem;border-top:1px solid rgba(255,255,255,.1)}
.cons-av{width:30px;height:30px;background:rgba(255,255,255,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
.cons-inf{font-size:.63rem;color:rgba(255,255,255,.42);line-height:1.4}
.cons-inf strong{color:rgba(255,255,255,.8);display:block;font-size:.66rem;font-weight:700}
.main{flex:1;overflow-y:auto;max-height:100vh;background:var(--bg)}
.sv{display:none;animation:fup .35s ease;max-width:720px;margin:0 auto;padding:2.5rem 3rem}
.sv.on{display:block}
.stbar{display:flex;align-items:center;gap:.8rem;margin-bottom:1.6rem}
.stnb{background:var(--ix);color:var(--wh);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;flex-shrink:0}
.stch{font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--ix);font-weight:800}
.stpbar{flex:1;height:3px;background:var(--g2);border-radius:2px;overflow:hidden}
.stpfill{height:100%;background:var(--ix);border-radius:2px;transition:width .5s ease}
.stitle{font-family:'Playfair Display',serif;font-size:1.85rem;font-weight:700;color:var(--ix);line-height:1.15;margin-bottom:.4rem}
.sintro{font-size:.85rem;color:var(--g6);font-weight:400;line-height:1.75;margin-bottom:1.6rem;max-width:500px;padding-bottom:1.4rem;border-bottom:2px solid var(--g2)}
.fg{margin-bottom:1.35rem}
.fl{display:block;font-size:.68rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--ix);margin-bottom:.48rem}
input[type=text],input[type=email],input[type=tel],input[type=number],select,textarea{width:100%;padding:.75rem .95rem;background:var(--wh);border:1.5px solid var(--g2);border-radius:4px;font-family:'Raleway',sans-serif;font-size:.86rem;color:var(--g8);transition:border-color .2s,box-shadow .2s;outline:none;font-weight:400}
input:focus,select:focus,textarea:focus{border-color:var(--ix);box-shadow:0 0 0 3px rgba(0,64,120,.07)}
textarea{resize:vertical;min-height:80px}
.cg{display:grid;gap:.55rem}
.cg.c2{grid-template-columns:1fr 1fr}
.cg.c3{grid-template-columns:1fr 1fr 1fr}
.cc{border:1.5px solid var(--g2);background:var(--wh);padding:.9rem .8rem;cursor:pointer;transition:all .18s;position:relative;text-align:left;border-radius:6px}
.cc:hover{border-color:var(--ix);box-shadow:0 3px 12px rgba(0,64,120,.1);transform:translateY(-1px)}
.cc.sel{border-color:var(--ix);background:var(--ix-p)}
.cc.sel::after{content:'✓';position:absolute;top:.48rem;right:.62rem;color:var(--ix);font-size:.7rem;font-weight:800}
.cc-icon{font-size:1.35rem;margin-bottom:.38rem}
.cc-t{font-size:.74rem;font-weight:700;color:var(--g8);margin-bottom:.12rem}
.cc-d{font-size:.63rem;color:var(--g4);line-height:1.4}
input[type=range]{width:100%;-webkit-appearance:none;height:4px;border:none;border-radius:2px;outline:none;padding:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--ix);cursor:pointer;border:3px solid var(--wh);box-shadow:0 2px 8px rgba(0,64,120,.3)}
.rl{display:flex;justify-content:space-between;margin-top:.4rem;font-size:.63rem;color:var(--g4);font-weight:600}
.rv{text-align:center;font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--ix);font-weight:700;margin-bottom:.5rem}
.tg{display:flex;gap:.38rem;flex-wrap:wrap}
.tb{padding:.4rem .78rem;border:1.5px solid var(--g2);background:var(--wh);cursor:pointer;font-family:'Raleway',sans-serif;font-size:.68rem;color:var(--g6);font-weight:600;transition:all .18s;border-radius:100px}
.tb:hover{border-color:var(--ix);color:var(--ix)}
.tb.sel{border-color:var(--ix);background:var(--ix);color:var(--wh)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
.sdiv{border:none;border-top:1px solid var(--g2);margin:1.4rem 0}
.slbl{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--g4);margin-bottom:.75rem;display:flex;align-items:center;gap:.6rem;font-weight:700}
.slbl::after{content:'';flex:1;height:1px;background:var(--g2)}
.navrow{display:flex;justify-content:space-between;align-items:center;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--g2)}
.btnprev{background:transparent;border:1.5px solid var(--g2);padding:.65rem 1.3rem;font-family:'Raleway',sans-serif;font-size:.7rem;color:var(--g6);cursor:pointer;font-weight:700;transition:all .2s;border-radius:4px}
.btnprev:hover{border-color:var(--g4);color:var(--g8)}
.btnnext{background:var(--ix);border:none;padding:.8rem 2.4rem;font-family:'Raleway',sans-serif;font-size:.72rem;color:var(--wh);cursor:pointer;letter-spacing:.1em;text-transform:uppercase;font-weight:800;transition:all .22s;border-radius:4px}
.btnnext:hover{background:var(--ix-m);box-shadow:0 4px 16px rgba(0,64,120,.3);transform:translateY(-1px)}
.score-card{background:var(--wh);border:2px solid var(--g2);border-radius:10px;padding:1.4rem 1.6rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.2rem}
.score-ring{width:68px;height:68px;flex-shrink:0;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700}
.score-info h3{font-size:.85rem;font-weight:800;color:var(--g8);margin-bottom:.2rem}
.score-info p{font-size:.75rem;color:var(--g6);line-height:1.5}
.score-tag{display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .75rem;border-radius:100px;font-size:.65rem;font-weight:800;letter-spacing:.05em;margin-top:.4rem}
.hot-tag{background:#fef2f2;color:var(--hot);border:1px solid #fecaca}
.warm-tag{background:#fffbeb;color:var(--warm);border:1px solid #fde68a}
.cold-tag{background:#eff6ff;color:var(--cold);border:1px solid #bfdbfe}
.email-card{background:var(--wh);border:1.5px solid var(--g2);border-radius:10px;padding:1.4rem 1.6rem;margin-bottom:1.5rem}
.email-title{font-size:.78rem;font-weight:800;color:var(--g8);margin-bottom:.3rem}
.email-sub{font-size:.73rem;color:var(--g6);margin-bottom:1rem;line-height:1.5}
.email-row{display:flex;gap:.7rem}
.email-row input{flex:1}
.btn-email{background:var(--ix);border:none;padding:.75rem 1.5rem;font-family:'Raleway',sans-serif;font-size:.72rem;color:var(--wh);cursor:pointer;font-weight:800;letter-spacing:.08em;text-transform:uppercase;border-radius:4px;white-space:nowrap;transition:all .22s}
.btn-email:hover{background:var(--ix-m)}
.email-success{display:none;color:var(--ok);font-size:.75rem;font-weight:700;margin-top:.6rem}
.rec-st{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ix);font-weight:800;margin:1.3rem 0 .6rem;padding-bottom:.42rem;border-bottom:2px solid var(--ix)}
.rec-grid{background:var(--g2);border-radius:6px;overflow:hidden;border:1px solid var(--g2);display:grid;gap:1px;margin-bottom:.35rem}
.rec-row{background:var(--wh);padding:.75rem 1rem;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem}
.rec-k{font-size:.63rem;color:var(--g4);text-transform:uppercase;letter-spacing:.07em;font-weight:800;flex-shrink:0;min-width:105px;padding-top:1px}
.rec-v{font-size:.8rem;color:var(--g8);font-weight:500;text-align:right;line-height:1.4}
.sbadge-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
.sbadge{padding:.4rem .9rem;background:var(--ix-l);color:var(--ix);font-size:.68rem;font-weight:800;border-radius:100px;border:1px solid rgba(0,64,120,.16)}
.sbadge.hl{background:var(--ix);color:var(--wh);border-color:var(--ix)}
.btn-dl{background:var(--ix);border:none;padding:.9rem 2rem;font-family:'Raleway',sans-serif;font-size:.73rem;color:var(--wh);cursor:pointer;letter-spacing:.1em;text-transform:uppercase;font-weight:800;width:100%;border-radius:4px;margin-bottom:.5rem;transition:all .22s}
.btn-dl:hover{background:var(--ix-m);box-shadow:0 4px 16px rgba(0,64,120,.25)}
.btn-rst{background:transparent;border:1.5px solid var(--g2);padding:.72rem;font-family:'Raleway',sans-serif;font-size:.68rem;color:var(--g4);cursor:pointer;width:100%;border-radius:4px;font-weight:600;transition:all .2s}
.btn-rst:hover{border-color:var(--g4);color:var(--g6)}
.ix-ft{text-align:center;margin-top:1.75rem;padding-top:1.5rem;border-top:1px solid var(--g2)}
.ix-ft img{height:22px;opacity:.28}
.ix-ft p{font-family:'Playfair Display',serif;font-size:.75rem;color:var(--g4);font-style:italic;margin-top:.4rem}
@media(max-width:860px){
  .sb{width:260px;min-width:260px}
  .sv{padding:2rem 1.5rem}
  .cg.c3{grid-template-columns:1fr 1fr}
  .two{grid-template-columns:1fr}
}
</style>
</head>

function start() {
  document.getElementById('intro').classList.add('out');
  document.getElementById('app').classList.add('on');
  renderProg(); renderStep(0);
}

function renderProg() {
  const t = document.getElementById('ptrack');
  t.innerHTML = '';
  STEPS.forEach((s,i) => {
    const last = i===STEPS.length-1;
    const d = document.createElement('div');
    d.className = 'pstep'+(i===cur?' active':'')+(i<cur?' done':'');
    if (i<=cur) d.onclick = ()=>goTo(i);
    d.innerHTML = '<div class="pdot-w"><div class="pdot"><span>'+(i+1)+'</span></div>'+(last?'':'<div class="pconn"></div>')+'</div><div class="plbl"><strong>'+s.title+'</strong>'+s.ch+'</div>';
    t.appendChild(d);
  });
}

function renderStep(idx) {
  const main = document.getElementById('main');
  const s = STEPS[idx];
  document.getElementById('narr').innerHTML = s.narr;
  if (idx === STEPS.length-1) { main.innerHTML = renderResult(); return; }
  const pct = Math.round((idx/(STEPS.length-1))*100);
  main.innerHTML = '<div class="sv on"><div class="stbar"><div class="stnb">'+(idx+1)+'</div><div class="stch">'+s.ch+'</div><div class="stpbar"><div class="stpfill" style="width:'+pct+'%"></div></div></div><h1 class="stitle">'+s.title+'</h1><p class="sintro">'+s.intro+'</p>'+renderFields(s.fields)+'<div class="navrow">'+(idx>0?'<button class="btnprev" onclick="goTo('+(idx-1)+')">← Retour</button>':'<span></span>')+'<button class="btnnext" onclick="goTo('+(idx+1)+')">'+(idx===STEPS.length-2?'Voir mes résultats →':'Continuer →')+'</button></div></div>';
  restoreAll(s.fields);
  main.querySelectorAll('input[type=range]').forEach(r=>{
    r.addEventListener('input',()=>{ const d=document.getElementById('rv-'+r.id); if(d) d.textContent=r.value+' '+(r.dataset.unit||''); upRange(r); });
    upRange(r);
  });
}

function upRange(r) {
  const p=((r.value-r.min)/(r.max-r.min))*100;
  r.style.background='linear-gradient(to right,var(--ix) '+p+'%,var(--g2) '+p+'%)';
}

function renderFields(fs) { return fs.map(f=>rf(f)).join(''); }

function rf(f) {
  if (!f) return '';
  switch(f.t) {
    case 'tx': case 'email': case 'tel': case 'num':
      var type = f.t==='tx'?'text':f.t==='num'?'number':f.t;
      return '<div class="fg"><label class="fl">'+f.l+'</label><input type="'+type+'" id="'+f.id+'" placeholder="'+(f.ph||'')+'" '+(f.min!=null?'min='+f.min:'')+' '+(f.max!=null?'max='+f.max:'')+' onchange="sv(\''+f.id+'\',this.value)"></div>';
    case 'sel':
      return '<div class="fg"><label class="fl">'+f.l+'</label><select id="'+f.id+'" onchange="sv(\''+f.id+'\',this.value)"><option value="">— Choisir —</option>'+f.opts.map(o=>'<option>'+o+'</option>').join('')+'</select></div>';
    case 'ta':
      return '<div class="fg">'+(f.l?'<label class="fl">'+f.l+'</label>':'')+'<textarea id="'+f.id+'" placeholder="'+(f.ph||'')+'" onchange="sv(\''+f.id+'\',this.value)"></textarea></div>';
    case 'range':
      return '<div class="fg"><div class="rv" id="rv-'+f.id+'">'+(D[f.id]||f.def)+' '+f.unit+'</div><input type="range" id="'+f.id+'" min="'+f.min+'" max="'+f.max+'" step="'+(f.step||1)+'" value="'+(D[f.id]||f.def)+'" data-unit="'+f.unit+'" onchange="sv(\''+f.id+'\',this.value)"><div class="rl"><span>'+f.min+' '+f.unit+'</span><span>'+f.max+' '+f.unit+'</span></div></div>';
    case 'cards':
      var cc = f.cols===3?'c3':f.cols===2?'c2':'';
      return '<div class="fg"><div class="cg '+cc+'" id="cg-'+f.id+'">'+f.opts.map(o=>'<div class="cc" data-g="'+f.id+'" data-v="'+esc(o.l)+'" onclick="selCard(\''+f.id+'\',this)"><div class="cc-icon">'+o.ic+'</div><div class="cc-t">'+o.l+'</div><div class="cc-d">'+o.d+'</div></div>').join('')+'</div></div>';
    case 'tog':
      return '<div class="fg"><div class="tg" id="tg-'+f.id+'">'+f.opts.map(o=>'<button class="tb" data-g="'+f.id+'" data-v="'+esc(o)+'" onclick="selTog(\''+f.id+'\',this,'+(f.multi||false)+')">'+o+'</button>').join('')+'</div></div>';
    case 'two': return '<div class="two">'+f.c.map(c=>rf(c)).join('')+'</div>';
    case 'div': return '<hr class="sdiv">';
    case 'lbl': return '<div class="slbl">'+f.tx+'</div>';
    default: return '';
  }
}

function esc(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function selCard(g,el) { document.querySelectorAll('.cc[data-g="'+g+'"]').forEach(c=>c.classList.remove('sel')); el.classList.add('sel'); sv(g,el.dataset.v); }
function selTog(g,el,multi) {
  if (!multi) { document.querySelectorAll('.tb[data-g="'+g+'"]').forEach(b=>b.classList.remove('sel')); el.classList.toggle('sel'); sv(g,el.classList.contains('sel')?el.dataset.v:''); }
  else { el.classList.toggle('sel'); sv(g,[...document.querySelectorAll('.tb[data-g="'+g+'"].sel')].map(b=>b.dataset.v).join(', ')); }
}
function sv(k,v) { D[k]=v; }
function restoreAll(fs) { fs.forEach(f=>{ if(!f) return; if(f.t==='two'){f.c.forEach(c=>rvF(c)); return;} rvF(f); }); }
function rvF(f) {
  if (!f||!f.id) return; var v=D[f.id]; if (!v) return;
  if (['tx','email','tel','num','ta','range'].includes(f.t)) { var el=document.getElementById(f.id); if(el){ el.value=v; if(f.t==='range'){var d=document.getElementById('rv-'+f.id); if(d) d.textContent=v+' '+(f.unit||'');} } }
  else if (f.t==='sel') { var el=document.getElementById(f.id); if(el) el.value=v; }
  else if (f.t==='cards') { var vals=v.split(', '); document.querySelectorAll('.cc[data-g="'+f.id+'"]').forEach(c=>{if(vals.includes(c.dataset.v)) c.classList.add('sel');}); }
  else if (f.t==='tog') { var vals=v.split(', '); document.querySelectorAll('.tb[data-g="'+f.id+'"]').forEach(b=>{if(vals.includes(b.dataset.v)) b.classList.add('sel');}); }
}
function goTo(i) { if(i<0||i>=STEPS.length) return; cur=i; renderProg(); renderStep(i); document.getElementById('main').scrollTop=0; }

function calcScore() {
  var score=0, budget=D.budget_range||'', delai=D.delai||'';
  if (budget.includes('35 000')||budget.includes('20 000')||budget.includes('10 000')) score+=30;
  else if (budget.includes('5 000')) score+=15;
  else if (budget.includes('<')) score+=5;
  if (delai.includes('Urgent')||delai.includes('1 à 3')) score+=30;
  else if (delai.includes('3 à 6')) score+=20;
  else if (delai.includes('6 mois')) score+=10;
  if (D.projet_type) score+=15;
  if (D.forme_cuisine && D.forme_cuisine!=='À définir') score+=10;
  if (D.superficie) score+=5;
  if (D.style_cuisine) score+=10;
  return Math.min(score,100);
}

function scoreLabel(s) {
  if (s>=70) return {txt:'Client chaud 🔥',tag:'hot-tag',desc:'Projet mature, budget défini — à contacter en priorité.',color:'#e53e3e'};
  if (s>=40) return {txt:'Client tiède ☕',tag:'warm-tag',desc:'Projet en cours de définition — nourrir avec des inspirations.',color:'#d97706'};
  return {txt:'En réflexion 💭',tag:'cold-tag',desc:'Projet encore flou — adapter le discours sur le long terme.',color:'#3b82f6'};
}

function sendMail() {
  var email=document.getElementById('cemail').value.trim();
  var btn=document.getElementById('sendbtn');
  var succ=document.getElementById('esucc');
  if(!email||!email.includes('@')){ document.getElementById('cemail').style.borderColor='var(--hot)'; return; }
  btn.disabled=true; btn.textContent='Envoi…';
  var nom=[D.prenom,D.nom].filter(Boolean).join(' ')||'Prospect';
  var subj=encodeURIComponent('Nouveau projet cuisine IXINA – '+nom);
  var body=encodeURIComponent(buildTxt());
  window.open('mailto:contact@ixina-reunion.re?subject='+subj+'&body='+body);
  setTimeout(function(){ btn.style.display='none'; succ.style.display='block'; },800);
}

function buildTxt() {
  var now=new Date().toLocaleDateString('fr-FR');
  var nom=[D.prenom,D.nom].filter(Boolean).join(' ')||'Prospect';
  return ['DOSSIER CLIENT IXINA RÉUNION','═══════════════════════════════','Créé le : '+now,'',
    '▸ CLIENT','Nom : '+nom,'Tél : '+(D.telephone||'—'),'Email : '+(D.email||'—'),'Ville : '+(D.ville||'—'),'',
    '▸ PROJET','Type : '+(D.projet_type||'—'),'Budget : '+(D.budget_range||'—'),'Délai : '+(D.delai||'—'),'',
    '▸ VIE QUOTIDIENNE','Personnes : '+(D.nb_personnes||'—'),'Enfants : '+(D.enfants||'—'),'Cuisiniers : '+(D.cuisiniers||'—'),'Style : '+(D.freq_cuisine||'—'),'Spécialités : '+(D.cuisine_reun||'—'),'',
    '▸ ESPACE','Forme : '+(D.forme_cuisine||'—'),'Superficie : '+(D.superficie||'—')+' m²','Ouverture : '+(D.ouverture||'—'),'Luminosité : '+(D.luminosite||'—'),'',
    '▸ ESTHÉTIQUE','Style : '+(D.style_cuisine||'—'),'Couleurs : '+(D.couleurs_facades||'—'),'Plan de travail : '+(D.plan_travail||'—'),'Poignées : '+(D.poignees||'—'),'',
    '▸ ÉQUIPEMENTS','Cuisson : '+(D.type_cuisson||'—'),'Équipements : '+(D.equipements_liste||'—'),'Bar : '+(D.espace_bar||'—'),'',
    '▸ NOTES','Rangements : '+(D.rangements||'—'),'','Points négatifs :',(D.points_negatifs||'—'),'','Rêve absolu :',(D.reve_absolu||'—'),'',
    '═══════════════════════════════','IXINA Réunion — "Fait pour vous. Fait pour durer."'
  ].join('\n');
}

function dlDossier() {
  var nom=[D.prenom,D.nom].filter(Boolean).join(' ')||'Prospect';
  var now=new Date().toLocaleDateString('fr-FR');
  var blob=new Blob([buildTxt()],{type:'text/plain;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download='IXINA_'+nom.replace(/\s+/g,'_')+'_'+now.replace(/\//g,'-')+'.txt'; a.click(); URL.revokeObjectURL(url);
}
